site_name: Портфолио с лабораторными работами

repo_url: https://github.com/breakthr0ugh/python_itmo
repo_name: GitHub

theme:
  name: material
  language: ru
  palette:
    scheme: slate
    primary: purple
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest

nav:
  - Главная: index.md
  - Об авторе: about.md
  - Лабораторные работы:
      - Лабораторная работа 1: labs/lab1.md
      - Лабораторная работа 2: labs/lab2.md
      - Лабораторная работа 3: labs/lab3.md
      - Лабораторная работа 4: labs/lab4.md
      - Лабораторная работа 5: labs/lab5.md


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true